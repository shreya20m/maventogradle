apply plugin: 'java'
apply plugin: 'application'   

group = 'com.example'
version = '1.0-SNAPSHOT'

sourceCompatibility = 11      
targetCompatibility = 11

repositories {
    mavenCentral()           
}

dependencies {
    testImplementation 'junit:junit:4.13.2'   
}

application {
    mainClass = 'com.example.App'  
}
